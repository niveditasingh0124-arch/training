<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0f0f">
<title>Training</title>
<style>
:root {
  --bg: #0f0f0f;
  --surface: #1a1a1a;
  --surface2: #242424;
  --surface3: #2e2e2e;
  --accent: #c8a96e;
  --accent-dim: rgba(200,169,110,0.15);
  --accent-glow: rgba(200,169,110,0.3);
  --green: #4ade80;
  --green-dim: rgba(74,222,128,0.15);
  --red: #f87171;
  --text: #f0f0f0;
  --text2: #aaaaaa;
  --text3: #666666;
  --border: rgba(255,255,255,0.08);
  --timer-color: #fb923c;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; background: var(--bg); }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100%;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
#app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  max-width: 480px;
  margin: 0 auto;
  position: relative;
  overflow: hidden;
}

/* HEADER */
.header {
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: calc(var(--safe-top) + 12px) 16px 0;
  flex-shrink: 0;
  z-index: 10;
}
.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.header-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: -0.3px;
}
.sw-header-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 6px 12px;
  font-size: 18px;
  cursor: pointer;
  line-height: 1;
  position: relative;
  flex-shrink: 0;
}
.sw-header-btn:active { opacity: 0.7; }
.sw-header-btn.sw-active {
  border-color: var(--green);
  background: var(--green-dim);
}
.sw-header-dot {
  position: absolute;
  top: 4px;
  right: 4px;
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--green);
  animation: sw-pulse 1s ease-in-out infinite;
}

/* WEEK TABS */
.week-tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 10px;
}
.week-tab {
  flex: 1;
  padding: 7px 4px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text3);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
}
.week-tab.active {
  background: var(--accent);
  color: #000;
  border-color: var(--accent);
}

/* DAY TABS */
.day-tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 10px;
}
.day-tab {
  flex: 1;
  padding: 8px 2px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text3);
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  text-align: center;
  line-height: 1.3;
  transition: all 0.15s;
}
.day-tab .day-num { font-size: 14px; display: block; }
.day-tab.active {
  background: var(--accent-dim);
  border-color: var(--accent);
  color: var(--accent);
}
.day-tab.has-data .day-num::after {
  content: '·';
  color: var(--green);
  margin-left: 1px;
}

/* BOTTOM NAV */
.bottom-nav {
  display: flex;
  background: var(--bg);
  border-top: 1px solid var(--border);
  padding-bottom: var(--safe-bottom);
  flex-shrink: 0;
}
.nav-btn {
  flex: 1;
  padding: 10px 4px;
  background: transparent;
  border: none;
  color: var(--text3);
  font-size: 11px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  transition: color 0.15s;
  position: relative;
}
.nav-btn .nav-icon { font-size: 20px; line-height: 1; }
.nav-btn.active { color: var(--accent); }
.nav-btn:active { opacity: 0.7; }

/* SCROLL AREA */
.scroll-area {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  padding: 12px 12px 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.scroll-area::-webkit-scrollbar { display: none; }

/* CARDS */
.card {
  background: var(--surface);
  border-radius: 14px;
  border: 1px solid var(--border);
  overflow: hidden;
}
.card-header {
  padding: 14px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
}
.card-header.no-toggle { cursor: default; }
.card-body { padding: 0 16px 14px; }
.card-body.hidden { display: none; }

/* DAY HERO CARD */
.day-hero {
  background: linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%);
  border-radius: 14px;
  padding: 16px;
  border: 1px solid var(--border);
}
.day-hero-title {
  font-size: 20px;
  font-weight: 700;
  line-height: 1.2;
  margin-bottom: 4px;
}
.day-hero-focus {
  color: var(--accent);
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 12px;
}
.day-hero-meta {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.meta-chip {
  background: var(--surface3);
  border-radius: 8px;
  padding: 5px 10px;
  font-size: 12px;
  color: var(--text2);
  display: flex;
  align-items: center;
  gap: 4px;
}
.meta-chip .chip-label { color: var(--text3); font-size: 11px; }
.meta-chip .chip-val { font-weight: 600; color: var(--text); }
.rest-chip {
  cursor: pointer;
  border: 1px solid var(--border);
}
.rest-chip:active { opacity: 0.7; }

/* WARMUP CARD */
.warmup-text {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.6;
}
.warmup-skill {
  margin-top: 10px;
  padding: 10px 12px;
  background: var(--accent-dim);
  border-radius: 10px;
  border-left: 3px solid var(--accent);
  font-size: 13px;
  color: var(--text);
  line-height: 1.5;
}
.section-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.8px;
}
.section-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
}
.chevron {
  color: var(--text3);
  font-size: 12px;
  transition: transform 0.2s;
}
.chevron.open { transform: rotate(90deg); }

/* EXERCISE CARD */
.ex-name {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.3;
  flex: 1;
  padding-right: 8px;
}
.ex-meta {
  display: flex;
  gap: 6px;
  margin-top: 6px;
  flex-wrap: wrap;
}
.ex-badge {
  background: var(--surface3);
  border-radius: 6px;
  padding: 3px 8px;
  font-size: 11px;
  font-weight: 600;
  color: var(--text2);
}
.ex-badge.rpe-high { color: var(--red); }
.ex-badge.rpe-med { color: var(--accent); }
.ex-badge.rpe-low { color: var(--green); }
.ex-notes {
  font-size: 12px;
  color: var(--text3);
  line-height: 1.5;
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px solid var(--border);
  display: none;
}
.ex-notes.visible { display: block; }
.notes-toggle {
  font-size: 11px;
  color: var(--accent);
  cursor: pointer;
  margin-top: 4px;
  display: inline-block;
}
.notes-toggle:active { opacity: 0.7; }

/* SET BUTTONS ROW */
.sets-row {
  display: flex;
  gap: 8px;
  margin-top: 10px;
  flex-wrap: wrap;
}
.set-btn {
  min-width: 64px;
  padding: 8px 6px;
  border-radius: 10px;
  border: 1.5px solid var(--border);
  background: var(--surface2);
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}
.set-btn:active { transform: scale(0.96); }
.set-btn.logged {
  border-color: var(--green);
  background: var(--green-dim);
}
.set-btn.skill-done {
  border-color: var(--accent);
  background: var(--accent-dim);
}
.set-num {
  font-size: 10px;
  font-weight: 700;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.set-status {
  font-size: 13px;
  font-weight: 700;
  color: var(--text3);
}
.set-btn.logged .set-status { color: var(--green); font-size: 11px; }
.set-btn.skill-done .set-status { color: var(--accent); font-size: 18px; }

/* SKILL BLOCK */
.skill-block {
  background: var(--surface2);
  border-radius: 10px;
  padding: 12px 14px;
  margin-top: 10px;
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
}
.skill-block:active { opacity: 0.7; }
.skill-done-btn {
  min-width: 44px;
  height: 44px;
  border-radius: 10px;
  border: 1.5px solid var(--border);
  background: var(--surface3);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}
.skill-done-btn.done {
  border-color: var(--accent);
  background: var(--accent-dim);
}
.skill-block-text { flex: 1; }
.skill-block-target { font-size: 13px; font-weight: 600; color: var(--text); }
.skill-block-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }

/* STRETCH REMINDER */
.stretch-card {
  background: var(--surface);
  border-radius: 14px;
  padding: 14px 16px;
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
}
.stretch-icon { font-size: 28px; }
.stretch-text { flex: 1; }
.stretch-title { font-size: 14px; font-weight: 600; }
.stretch-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }

/* STOPWATCH OVERLAY */
#sw-overlay {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  max-width: 480px;
  margin: 0 auto;
  background: var(--surface);
  border-top: 1px solid var(--border);
  border-radius: 20px 20px 0 0;
  padding: 16px 24px calc(20px + var(--safe-bottom));
  z-index: 49;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  box-shadow: 0 -4px 40px rgba(0,0,0,0.6);
  display: flex;
  flex-direction: column;
  align-items: center;
}
#sw-overlay.visible { transform: translateY(0); }
.sw-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 1.2px;
  margin-bottom: 16px;
}
.sw-display {
  font-size: 68px;
  font-weight: 200;
  color: var(--text);
  font-variant-numeric: tabular-nums;
  letter-spacing: -3px;
  line-height: 1;
  margin-bottom: 4px;
  transition: color 0.2s;
}
.sw-display.running { color: var(--green); }
.sw-display.stopped { color: var(--accent); }
.sw-centis {
  font-size: 28px;
  font-weight: 300;
  color: var(--text3);
  font-variant-numeric: tabular-nums;
  letter-spacing: -1px;
  margin-bottom: 24px;
  text-align: center;
}
.sw-btns {
  display: flex;
  gap: 10px;
  width: 100%;
  max-width: 340px;
}
.sw-btn {
  flex: 1;
  padding: 16px 8px;
  border-radius: 14px;
  border: 1.5px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
  line-height: 1.3;
}
.sw-btn:active { transform: scale(0.96); opacity: 0.8; }
.sw-btn.sw-start {
  background: var(--green-dim);
  border-color: var(--green);
  color: var(--green);
}
.sw-btn.sw-stop {
  background: rgba(248,113,113,0.12);
  border-color: var(--red);
  color: var(--red);
}
.sw-btn.sw-reset {
  background: var(--accent-dim);
  border-color: var(--accent);
  color: var(--accent);
  font-size: 11px;
}
.sw-btn:disabled {
  opacity: 0.3;
  cursor: default;
  transform: none;
}
.sw-running-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--green);
  display: inline-block;
  margin-left: 3px;
  vertical-align: middle;
  animation: sw-pulse 1s ease-in-out infinite;
}
@keyframes sw-pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.7); }
}

/* REST TIMER OVERLAY */
#timer-overlay {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  max-width: 480px;
  margin: 0 auto;
  background: var(--surface);
  border-top: 1px solid var(--border);
  border-radius: 20px 20px 0 0;
  padding: 16px 20px calc(16px + var(--safe-bottom));
  z-index: 50;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  box-shadow: 0 -4px 40px rgba(0,0,0,0.6);
}
#timer-overlay.visible { transform: translateY(0); }
.timer-handle {
  width: 40px;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 0 auto 16px;
}
.timer-label {
  text-align: center;
  font-size: 12px;
  color: var(--text3);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 8px;
}
.timer-display {
  text-align: center;
  font-size: 72px;
  font-weight: 300;
  color: var(--timer-color);
  font-variant-numeric: tabular-nums;
  line-height: 1;
  margin-bottom: 16px;
  letter-spacing: -2px;
}
.timer-display.done { color: var(--green); }
.timer-controls {
  display: flex;
  gap: 10px;
  align-items: center;
  justify-content: center;
  margin-bottom: 12px;
}
.timer-btn {
  padding: 10px 20px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
}
.timer-btn.primary {
  background: var(--accent);
  border-color: var(--accent);
  color: #000;
  padding: 10px 28px;
}
.timer-btn:active { opacity: 0.7; }
.timer-adjust {
  display: flex;
  gap: 8px;
  justify-content: center;
}
.adjust-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 14px;
  color: var(--text2);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
}
.adjust-btn:active { opacity: 0.7; }

/* LOG MODAL */
#log-modal {
  position: fixed;
  inset: 0;
  z-index: 60;
  display: flex;
  align-items: flex-end;
  max-width: 480px;
  margin: 0 auto;
}
#log-modal.hidden { display: none; }
.modal-backdrop {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(4px);
}
.modal-sheet {
  position: relative;
  width: 100%;
  background: var(--surface);
  border-radius: 20px 20px 0 0;
  padding: 16px 20px calc(24px + var(--safe-bottom));
  z-index: 1;
  border-top: 1px solid var(--border);
}
.modal-handle {
  width: 40px;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 0 auto 16px;
}
.modal-title {
  font-size: 16px;
  font-weight: 700;
  text-align: center;
  margin-bottom: 4px;
}
.modal-sub {
  font-size: 12px;
  color: var(--text3);
  text-align: center;
  margin-bottom: 20px;
}
.input-row {
  display: flex;
  gap: 12px;
  margin-bottom: 12px;
}
.input-group {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.input-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.6px;
}
.input-field {
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 14px 12px;
  color: var(--text);
  font-size: 22px;
  font-weight: 600;
  text-align: center;
  width: 100%;
  outline: none;
  -webkit-appearance: none;
  appearance: none;
}
.input-field:focus { border-color: var(--accent); }
.input-field::placeholder { color: var(--text3); font-size: 16px; font-weight: 400; }
.modal-prev {
  background: var(--surface2);
  border-radius: 8px;
  padding: 8px 12px;
  font-size: 12px;
  color: var(--text3);
  margin-bottom: 16px;
  text-align: center;
}
.modal-prev span { color: var(--text2); font-weight: 600; }
.modal-actions {
  display: flex;
  gap: 10px;
}
.modal-btn {
  flex: 1;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text2);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
}
.modal-btn.primary {
  background: var(--accent);
  border-color: var(--accent);
  color: #000;
}
.modal-btn:active { opacity: 0.7; }

/* TIMER EDIT MODAL */
#timer-edit-modal {
  position: fixed;
  inset: 0;
  z-index: 70;
  display: flex;
  align-items: flex-end;
  max-width: 480px;
  margin: 0 auto;
}
#timer-edit-modal.hidden { display: none; }
.timer-edit-sheet {
  position: relative;
  width: 100%;
  background: var(--surface);
  border-radius: 20px 20px 0 0;
  padding: 16px 20px calc(24px + var(--safe-bottom));
  z-index: 1;
  border-top: 1px solid var(--border);
}
.timer-presets {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin: 16px 0;
}
.preset-btn {
  flex: 1;
  min-width: 70px;
  padding: 12px 8px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  text-align: center;
}
.preset-btn.active {
  border-color: var(--accent);
  background: var(--accent-dim);
  color: var(--accent);
}
.preset-btn:active { opacity: 0.7; }

/* STRETCH TAB */
.stretch-section {
  margin-bottom: 8px;
}
.stretch-section-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--accent);
  padding: 8px 0 6px;
}
.stretch-item {
  background: var(--surface);
  border-radius: 12px;
  border: 1px solid var(--border);
  padding: 12px 14px;
  margin-bottom: 6px;
  display: flex;
  align-items: flex-start;
  gap: 10px;
  cursor: pointer;
}
.stretch-item:active { opacity: 0.7; }
.stretch-check {
  width: 22px;
  height: 22px;
  border-radius: 6px;
  border: 1.5px solid var(--border);
  background: var(--surface2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  flex-shrink: 0;
  margin-top: 1px;
}
.stretch-check.done {
  border-color: var(--green);
  background: var(--green-dim);
  color: var(--green);
}
.stretch-item-main { flex: 1; }
.stretch-item-name { font-size: 14px; font-weight: 600; }
.stretch-item-meta {
  font-size: 12px;
  color: var(--text2);
  margin-top: 2px;
}
.stretch-item-cue {
  font-size: 11px;
  color: var(--text3);
  margin-top: 4px;
  line-height: 1.4;
}
.stretch-progress-bar {
  background: var(--surface2);
  border-radius: 6px;
  height: 6px;
  margin: 8px 0;
  overflow: hidden;
}
.stretch-progress-fill {
  height: 100%;
  background: var(--green);
  border-radius: 6px;
  transition: width 0.3s;
}

/* HANDSTAND TAB */
.hs-stage {
  background: var(--surface);
  border-radius: 14px;
  border: 1px solid var(--border);
  margin-bottom: 8px;
  overflow: hidden;
}
.hs-stage-header {
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
}
.hs-stage-badge {
  background: var(--accent);
  color: #000;
  border-radius: 8px;
  padding: 4px 10px;
  font-size: 12px;
  font-weight: 700;
}
.hs-stage-title {
  font-size: 14px;
  font-weight: 600;
  flex: 1;
}
.hs-stage-body { padding: 0 16px 14px; }
.hs-stage-body.hidden { display: none; }
.hs-drill {
  background: var(--surface2);
  border-radius: 10px;
  padding: 10px 12px;
  margin-bottom: 6px;
  display: flex;
  align-items: flex-start;
  gap: 10px;
  cursor: pointer;
}
.hs-drill:active { opacity: 0.7; }
.hs-drill-check {
  width: 20px;
  height: 20px;
  border-radius: 5px;
  border: 1.5px solid var(--border);
  background: var(--surface3);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  flex-shrink: 0;
  margin-top: 1px;
}
.hs-drill-check.done {
  border-color: var(--accent);
  background: var(--accent-dim);
  color: var(--accent);
}
.hs-drill-info { flex: 1; }
.hs-drill-name { font-size: 13px; font-weight: 600; }
.hs-drill-meta { font-size: 11px; color: var(--text2); margin-top: 2px; }
.hs-drill-note { font-size: 11px; color: var(--text3); margin-top: 3px; line-height: 1.4; }
.hs-principles {
  background: var(--accent-dim);
  border-radius: 10px;
  padding: 12px 14px;
  border-left: 3px solid var(--accent);
  margin-top: 8px;
}
.hs-principles-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.hs-principle { font-size: 12px; color: var(--text2); line-height: 1.5; margin-bottom: 4px; }
.hs-wrist-section {
  background: var(--surface2);
  border-radius: 10px;
  padding: 12px 14px;
  margin-bottom: 8px;
  border: 1px solid var(--border);
}
.hs-wrist-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--red);
  margin-bottom: 8px;
}

/* TOAST */
#toast {
  position: fixed;
  top: calc(var(--safe-top) + 60px);
  left: 50%;
  transform: translateX(-50%) translateY(-20px);
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 18px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  z-index: 100;
  opacity: 0;
  transition: all 0.3s;
  white-space: nowrap;
  max-width: 90%;
  text-align: center;
  pointer-events: none;
}
#toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* PROGRESS INDICATOR */
.day-progress {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 10px;
}
.day-progress-bar {
  flex: 1;
  background: var(--surface2);
  border-radius: 4px;
  height: 4px;
  overflow: hidden;
}
.day-progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 4px;
  transition: width 0.4s ease;
}
.day-progress-text {
  font-size: 11px;
  font-weight: 600;
  color: var(--text3);
  white-space: nowrap;
}

      <span>Pull-Up</span>

<div id="timer-overlay">
  <div class="timer-handle"></div>
  <div class="timer-label">REST</div>
  <div class="timer-display" id="timerDisplay">2:00</div>
  <div class="timer-controls">
    <button class="timer-btn" onclick="skipTimer()">Skip</button>
    <button class="timer-btn primary" id="timerToggleBtn" onclick="toggleTimer()">Pause</button>
  </div>
  <div class="timer-adjust">
    <button class="adjust-btn" onclick="adjustTimer(-30)">−30s</button>
    <button class="adjust-btn" onclick="adjustTimer(30)">+30s</button>
  </div>
</div>

<!-- LOG MODAL -->

      <div class="input-group">

        <input class="input-field" type="number" id="repsInput" placeholder="—" min="1" max="100" inputmode="numeric">

function loadState() {

    if (saved) {
      const p = JSON.parse(saved);
      Object.assign(state, p);
    }
  } catch(e) {}

}

// ─────────────────────────────────────────────
let timerInterval = null;
let timerRemaining = 0;
let timerRunning = false;
let timerVisible = false;

function startTimer(seconds) {
  timerRemaining = seconds;
  timerRunning = true;
  showTimerOverlay();
  updateTimerDisplay();
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    if (timerRemaining <= 0) {
      clearInterval(timerInterval);
      timerRunning = false;
      document.getElementById('timerDisplay').classList.add('done');
      document.getElementById('timerToggleBtn').textContent = 'Done';
      navigator.vibrate && navigator.vibrate([200, 100, 200]);
      return;
    }
    timerRemaining--;
    updateTimerDisplay();
  }, 1000);
}

function updateTimerDisplay() {
  const m = Math.floor(timerRemaining / 60);
  const s = timerRemaining % 60;
  document.getElementById('timerDisplay').textContent = `${m}:${s.toString().padStart(2,'0')}`;
  document.getElementById('timerDisplay').classList.remove('done');
  document.getElementById('timerToggleBtn').textContent = timerRunning ? 'Pause' : 'Resume';
}

function toggleTimer() {
  if (timerRemaining <= 0) { hideTimerOverlay(); return; }
  if (timerRunning) {
    clearInterval(timerInterval);
    timerRunning = false;
    document.getElementById('timerToggleBtn').textContent = 'Resume';
  } else {
    timerRunning = true;
    document.getElementById('timerToggleBtn').textContent = 'Pause';
    timerInterval = setInterval(() => {
      if (timerRemaining <= 0) {
        clearInterval(timerInterval);
        timerRunning = false;
        document.getElementById('timerDisplay').classList.add('done');
        document.getElementById('timerToggleBtn').textContent = 'Done';
        navigator.vibrate && navigator.vibrate([200, 100, 200]);
        return;
      }
      timerRemaining--;
      updateTimerDisplay();
    }, 1000);
  }
}

function skipTimer() { clearInterval(timerInterval); timerRunning = false; hideTimerOverlay(); }
function adjustTimer(delta) {
  timerRemaining = Math.max(10, timerRemaining + delta);
  updateTimerDisplay();
}
function showTimerOverlay() { document.getElementById('timer-overlay').classList.add('visible'); timerVisible = true; }
function hideTimerOverlay() { document.getElementById('timer-overlay').classList.remove('visible'); timerVisible = false; }

// ─────────────────────────────────────────────
let swRunning = false;
let swStartTime = null;
let swElapsed = 0;
let swInterval = null;
let swLaps = [];

function swFormatTime(ms) {
  const totalSec = Math.floor(ms / 1000);
  const min = Math.floor(totalSec / 60);
  const sec = totalSec % 60;
  const centis = Math.floor((ms % 1000) / 10);
  return {
    main: `${String(min).padStart(2,'0')}:${String(sec).padStart(2,'0')}`,
    sub: `.${String(centis).padStart(2,'0')}`
  };
}

let swOverlayVisible = false;

function toggleSwOverlay() {
  swOverlayVisible = !swOverlayVisible;
  const overlay = document.getElementById('sw-overlay');
  overlay.classList.toggle('visible', swOverlayVisible);
}

function swTick() {
  swElapsed = Date.now() - swStartTime;
  swUpdateDisplay();
}

function swUpdateDisplay() {
  const dispEl = document.getElementById('sw-display');
  const subEl = document.getElementById('sw-centis');
  if (!dispEl) return;
  const { main, sub } = swFormatTime(swElapsed);
  dispEl.textContent = main;
  if (subEl) subEl.textContent = sub;
  dispEl.className = 'sw-display' + (swRunning ? ' running' : swElapsed > 0 ? ' stopped' : '');
}

function swUpdateHeaderBtn() {
  const btn = document.getElementById('swHeaderBtn');
  if (!btn) return;
  const dot = btn.querySelector('.sw-header-dot');
  if (swRunning) {
    btn.classList.add('sw-active');
    if (!dot) {
      const d = document.createElement('span');
      d.className = 'sw-header-dot';
      btn.appendChild(d);
    }
  } else {
    btn.classList.remove('sw-active');
    if (dot) dot.remove();
  }
}

function swStart() {
  if (swRunning) return;
  swRunning = true;
  swStartTime = Date.now() - swElapsed;
  swInterval = setInterval(swTick, 30);
  swUpdateDisplay();
  swUpdateButtons();
  swUpdateHeaderBtn();
}

function swStop() {
  if (!swRunning) return;
  clearInterval(swInterval);
  swRunning = false;
  swElapsed = Date.now() - swStartTime;
  swUpdateDisplay();
  swUpdateButtons();
  swUpdateHeaderBtn();
}

function swResetStart() {
  clearInterval(swInterval);
  swElapsed = 0;
  swRunning = true;
  swStartTime = Date.now();
  swInterval = setInterval(swTick, 30);
  swUpdateDisplay();
  swUpdateButtons();
  swUpdateHeaderBtn();
}

function swUpdateButtons() {
  const startBtn = document.getElementById('sw-btn-start');
  const stopBtn = document.getElementById('sw-btn-stop');
  if (!startBtn || !stopBtn) return;
  startBtn.disabled = swRunning;
  stopBtn.disabled = !swRunning;
}

// ─────────────────────────────────────────────
//  LOG MODAL
// ─────────────────────────────────────────────
let modalCtx = null;

function openLogModal(weekIdx, dayIdx, exIdx, setIdx) {
  const weekDay = WEEK_DATA[weekIdx].days[dayIdx];
  const exData = DAY_EXERCISES[dayIdx][exIdx];
  const setData = weekDay.exercises[exIdx];
  const key = `w${weekIdx}_d${dayIdx}_ex${exIdx}_s${setIdx}`;

  modalCtx = { weekIdx, dayIdx, exIdx, setIdx, key };

  document.getElementById('modalTitle').textContent = `Log Set ${setIdx + 1}`;
  document.getElementById('modalSub').textContent = `${exData.name.split('(')[0].trim()} · Target: ${setData[1]} reps`;
  document.getElementById('weightLabel').textContent = `Weight (${state.unit})`;

  const prevLog = state.logs[key];
  const prevEl = document.getElementById('modalPrev');
  const prevVal = document.getElementById('modalPrevVal');
  if (prevLog) {
    prevEl.style.display = 'block';
    prevVal.textContent = `${prevLog.weight}${state.unit} × ${prevLog.reps}`;
  } else {
    prevEl.style.display = 'none';
  }

  document.getElementById('weightInput').value = prevLog ? prevLog.weight : '';
  document.getElementById('repsInput').value = prevLog ? prevLog.reps : '';
  document.getElementById('log-modal').classList.remove('hidden');
  setTimeout(() => document.getElementById('weightInput').focus(), 100);
}

function closeLogModal() {
  document.getElementById('log-modal').classList.add('hidden');
  modalCtx = null;
}

function logSet() {
  if (!modalCtx) return;
  const weight = document.getElementById('weightInput').value;
  const reps = document.getElementById('repsInput').value;

  state.logs[modalCtx.key] = { weight: weight || '—', reps: reps || '—' };
  saveState();
  closeLogModal();
  renderWorkout();

  const restSecs = state.restDefaults[modalCtx.dayIdx];
  startTimer(restSecs);
  showToast('Set logged ✓ Rest starting');
}

// ─────────────────────────────────────────────
//  TIMER EDIT
// ─────────────────────────────────────────────
let editingDayIdx = null;

function openTimerEdit(dayIdx) {
  editingDayIdx = dayIdx;
  const presets = [45, 60, 90, 120, 150, 180];
  const current = state.restDefaults[dayIdx];
  const el = document.getElementById('timerPresets');
  el.innerHTML = presets.map(s => {
    const m = Math.floor(s/60), sec = s%60;
    const label = sec === 0 ? `${m}:00` : `${m}:${sec.toString().padStart(2,'0')}`;
    return `<button class="preset-btn ${s === current ? 'active' : ''}" onclick="setTimerPreset(${s})">${label}</button>`;
  }).join('');
  document.getElementById('timer-edit-modal').classList.remove('hidden');
}

function setTimerPreset(s) {
  if (editingDayIdx === null) return;
  state.restDefaults[editingDayIdx] = s;
  saveState();
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderWorkout();
}

function closeTimerEdit() {
  document.getElementById('timer-edit-modal').classList.add('hidden');
  editingDayIdx = null;
}

// ─────────────────────────────────────────────
//  TOGGLE FUNCTIONS
// ─────────────────────────────────────────────

function setTab(tab) {
  state.tab = tab;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`nav-${tab}`).classList.add('active');
  renderMain();
}

function setWeek(w) {
  state.week = w;
  saveState();
  renderTabs();
  renderMain();
}

function setDay(d) {
  state.day = d;
  saveState();
  renderTabs();
  renderMain();
  document.getElementById('scrollArea').scrollTop = 0;
}

function toggleCard(id) {
  const body = document.getElementById(id);
  const chevron = body.previousElementSibling.querySelector('.chevron');
  if (body.classList.contains('hidden')) {
    body.classList.remove('hidden');
    if (chevron) chevron.classList.add('open');
  } else {
    body.classList.add('hidden');
    if (chevron) chevron.classList.remove('open');
  }
}

function toggleNotes(id) {
  const el = document.getElementById(id);
  if (!el) return;
  const visible = el.style.display !== 'none';
  el.style.display = visible ? 'none' : 'block';
  const toggle = el.previousElementSibling;
  if (toggle) toggle.textContent = visible ? 'form cue ▼' : 'hide ▲';
}

function toggleHsStage(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.toggle('hidden');
}

function markSkillDone(weekIdx, dayIdx, exIdx) {
  const key = `w${weekIdx}_d${dayIdx}_ex${exIdx}`;
  state.skillDone[key] = !state.skillDone[key];
  saveState();
  renderWorkout();
  if (state.skillDone[key]) {
    startTimer(state.restDefaults[dayIdx]);
    showToast('Skill done! Rest starting ✓');
  }
}

function toggleStretch(idx) {
  const key = `s_${idx}`;
  state.stretchDone[key] = !state.stretchDone[key];
  saveState();
  renderStretch();
}

function toggleHsDrill(stage, drill) {
  const key = `hs_s${stage}_d${drill}`;
  state.hsDone[key] = !state.hsDone[key];
  saveState();
  renderHandstand();
}

// ─────────────────────────────────────────────
//  TOAST
// ─────────────────────────────────────────────
let toastTimer = null;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

// ─────────────────────────────────────────────
//  RENDERING
// ─────────────────────────────────────────────
function renderTabs() {
  // Week tabs
  const wt = document.getElementById('weekTabs');
  wt.innerHTML = WEEK_DATA.map((w, i) =>
    `<button class="week-tab ${i === state.week ? 'active' : ''}" onclick="setWeek(${i})">${w.name}</button>`
  ).join('');

  // Day tabs
  const dt = document.getElementById('dayTabs');
  dt.innerHTML = DAY_CONFIGS.map((d, i) => {
    const hasData = Object.keys(state.logs).some(k => k.startsWith(`w${state.week}_d${i}_`));
    return `<button class="day-tab ${i === state.day ? 'active' : ''} ${hasData ? 'has-data' : ''}" onclick="setDay(${i})">
      <span class="day-num">D${i+1}</span>${d.label}
    </button>`;
  }).join('');
}

function rpeClass(rpe) {
  const r = parseFloat(rpe);
  if (r >= 9) return 'rpe-high';
  if (r >= 7) return 'rpe-med';
  return 'rpe-low';
}

function formatRest(secs) {
  const m = Math.floor(secs/60), s = secs%60;
  return s === 0 ? `${m}:00` : `${m}:${s.toString().padStart(2,'0')}`;
}

function renderWorkout() {
  const w = state.week, d = state.day;
  const weekDayData = WEEK_DATA[w].days[d];
  const dayConfig = DAY_CONFIGS[d];
  const exTemplates = DAY_EXERCISES[d];
  const weekMeta = WEEK_DATA[w];

  // Count progress
  let totalSets = 0, doneSets = 0;
  weekDayData.exercises.forEach((ex, ei) => {
    const template = exTemplates[ei];
    if (!template) return;
    const sets = parseInt(ex[0]);
    if (!isNaN(sets) && !template.isAgility && !template.isSkill) {
      totalSets += sets;
      for (let s = 0; s < sets; s++) {
        if (state.logs[`w${w}_d${d}_ex${ei}_s${s}`]) doneSets++;
      }
    }
  });

  const progressPct = totalSets > 0 ? Math.round((doneSets/totalSets)*100) : 0;

  let html = '';

  // Day hero
  const restSecs = state.restDefaults[d];
  html += `<div class="day-hero">
    <div class="day-hero-title">Day ${d+1} — ${weekMeta.name}</div>
    <div class="day-hero-focus">${dayConfig.focus}</div>
    <div class="day-hero-meta">
      <div class="meta-chip"><span class="chip-label">Phase</span>&nbsp;<span class="chip-val">${weekMeta.subtitle.split('—')[0].trim()}</span></div>
      <div class="meta-chip rest-chip" onclick="openTimerEdit(${d})">⏱ <span class="chip-label">Rest</span>&nbsp;<span class="chip-val">${formatRest(restSecs)}</span></div>
    </div>
    <div class="day-progress">
      <div class="day-progress-bar"><div class="day-progress-fill" style="width:${progressPct}%"></div></div>
      <div class="day-progress-text">${doneSets}/${totalSets} sets</div>
    </div>
  </div>`;

  // Warmup — always fully visible, driven by dayConfig
  const hasChinUpSkill = dayConfig.chinUpSkill;
  html += `<div style="background:var(--surface);border-radius:14px;border:1px solid var(--border);padding:14px 16px;">
    <div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px;">Warm-Up · ${hasChinUpSkill ? '10 min + 5 min chin-up skill' : '10 min'}</div>
    <div style="font-size:13px;color:var(--text2);line-height:1.6;">${dayConfig.warmupText}</div>
    ${hasChinUpSkill ? `<div style="margin-top:10px;padding:10px 12px;background:var(--accent-dim);border-radius:10px;border-left:3px solid var(--accent);font-size:13px;color:var(--text);line-height:1.5;">🔗 <strong>Chin-Up Skill (5 min):</strong><br>${WARMUP_SKILL}</div>` : ''}
  </div>`;

  // Exercises — flat cards with primary/optional visual distinction
  let prevWasOptional = false;
  weekDayData.exercises.forEach((exRow, ei) => {
    const template = exTemplates[ei];
    if (!template) return;
    const [sets, reps, rpe] = exRow;
    const isAgility = template.isAgility;
    const isSkill = template.isSkill;
    const isTime = template.isTime;
    const noWeight = template.noWeight;
    const isPrimary = template.primary !== false; // default true if not set
    const numSets = parseInt(sets);

    // Insert "Optional" divider on first optional exercise
    if (!isPrimary && !prevWasOptional) {
      html += `<div style="display:flex;align-items:center;gap:8px;padding:4px 4px;">
        <div style="flex:1;height:1px;background:var(--border);"></div>
        <span style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;">Optional — pick 1-2</span>
        <div style="flex:1;height:1px;background:var(--border);"></div>
      </div>`;
      prevWasOptional = true;
    }

    const cardBorderLeft = isPrimary ? '3px solid var(--accent)' : '3px solid var(--surface3)';
    const cardOpacity = isPrimary ? '1' : '0.75';
    const nameColor = isPrimary ? 'var(--text)' : 'var(--text2)';

    if (isAgility || ((isSkill || isTime) && sets === '—')) {
      const skillKey = `w${w}_d${d}_ex${ei}`;
      const done = state.skillDone[skillKey];
      const notesId = `notes_w${w}_d${d}_ex${ei}`;
      html += `<div style="background:var(--surface);border-radius:14px;border:1px solid var(--border);border-left:${cardBorderLeft};padding:14px 16px;opacity:${cardOpacity};">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
          <span style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;">${isAgility ? 'Agility' : isTime ? 'Skill · Hold' : 'Skill Block'}</span>
          ${!isPrimary ? '<span style="font-size:10px;font-weight:700;background:var(--surface3);color:var(--text3);border-radius:4px;padding:2px 6px;text-transform:uppercase;letter-spacing:0.5px;">OPT</span>' : ''}
        </div>
        <div style="font-size:14px;font-weight:600;color:${nameColor};margin-bottom:8px;">${template.name}</div>
        <div style="display:inline-block;background:var(--surface3);border-radius:6px;padding:3px 8px;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:10px;">Target: ${reps}</div>
        <div style="background:var(--surface2);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;" onclick="markSkillDone(${w},${d},${ei})">
          <div style="width:44px;height:44px;border-radius:10px;border:1.5px solid ${done ? 'var(--accent)' : 'var(--border)'};background:${done ? 'var(--accent-dim)' : 'var(--surface3)'};display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;">${done ? '✓' : '○'}</div>
          <div>
            <div style="font-size:13px;font-weight:600;color:${done ? 'var(--accent)' : 'var(--text)'};">${done ? 'Completed ✓' : 'Tap to mark done'}</div>
            <div style="font-size:11px;color:var(--text3);margin-top:2px;">${template.notes.substring(0, 70)}…</div>
          </div>
        </div>
        <div style="font-size:11px;color:var(--accent);cursor:pointer;margin-top:8px;" onclick="toggleNotes('${notesId}')">full instructions ▼</div>
        <div id="${notesId}" style="display:none;font-size:12px;color:var(--text3);line-height:1.5;margin-top:6px;padding-top:6px;border-top:1px solid var(--border);">${template.notes}</div>
      </div>`;

    } else if (!isNaN(numSets)) {
      let setsHtml = '';
      for (let s = 0; s < numSets; s++) {
        const logKey = `w${w}_d${d}_ex${ei}_s${s}`;
        const log = state.logs[logKey];
        const logged = !!log;
        const statusText = logged
          ? (noWeight || isTime ? (log.reps !== '—' ? log.reps + (isTime ? 's' : '') : '✓') : `${log.weight}<br>×${log.reps}`)
          : '+';
        setsHtml += `<button onclick="openLogModal(${w},${d},${ei},${s})" style="min-width:60px;padding:8px 6px;border-radius:10px;border:1.5px solid ${logged ? 'var(--green)' : 'var(--border)'};background:${logged ? 'var(--green-dim)' : 'var(--surface2)'};cursor:pointer;text-align:center;display:inline-flex;flex-direction:column;align-items:center;gap:3px;">
          <span style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;">Set ${s+1}</span>
          <span style="font-size:${logged && !noWeight ? '11px' : '14px'};font-weight:700;color:${logged ? 'var(--green)' : 'var(--text2)'};">${statusText}</span>
        </button>`;
      }

      const notesId = `notes_w${w}_d${d}_ex${ei}`;
      const rpeCol = rpeClass(rpe);
      const rpeColor = rpeCol === 'rpe-high' ? 'var(--red)' : rpeCol === 'rpe-med' ? 'var(--accent)' : 'var(--green)';

      html += `<div style="background:var(--surface);border-radius:14px;border:1px solid var(--border);border-left:${cardBorderLeft};padding:14px 16px;opacity:${cardOpacity};">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;">
          <div style="font-size:14px;font-weight:600;color:${nameColor};line-height:1.3;flex:1;padding-right:8px;">${template.name}</div>
          ${!isPrimary ? '<span style="font-size:10px;font-weight:700;background:var(--surface3);color:var(--text3);border-radius:4px;padding:2px 6px;text-transform:uppercase;letter-spacing:0.5px;white-space:nowrap;flex-shrink:0;">OPT</span>' : ''}
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;">
          <span style="background:var(--surface3);border-radius:6px;padding:3px 8px;font-size:11px;font-weight:600;color:var(--text2);">${sets} sets</span>
          <span style="background:var(--surface3);border-radius:6px;padding:3px 8px;font-size:11px;font-weight:600;color:var(--text2);">${reps} reps</span>
          <span style="background:var(--surface3);border-radius:6px;padding:3px 8px;font-size:11px;font-weight:600;color:${rpeColor};">RPE ${rpe}</span>
          ${noWeight ? '<span style="background:var(--surface3);border-radius:6px;padding:3px 8px;font-size:11px;font-weight:600;color:var(--text2);">Bodyweight</span>' : ''}
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;">${setsHtml}</div>
        <div style="font-size:11px;color:var(--accent);cursor:pointer;" onclick="toggleNotes('${notesId}')">form cue ▼</div>
        <div id="${notesId}" style="display:none;font-size:12px;color:var(--text3);line-height:1.5;margin-top:6px;padding-top:6px;border-top:1px solid var(--border);">${template.notes}</div>
      </div>`;
    }
  });

  // Stretch reminder
  html += `<div style="background:var(--surface);border-radius:14px;border:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;gap:12px;">
    <span style="font-size:28px;">🧘</span>
    <div>
      <div style="font-size:14px;font-weight:600;">Daily Stretch — 10-15 min</div>
      <div style="font-size:12px;color:var(--text2);margin-top:2px;">Side split + middle split flow → Stretch tab</div>
    </div>
  </div>`;

  document.getElementById('scrollArea').innerHTML = html;
}

function renderStretch() {
  const allItems = [...STRETCH_DATA.sideA, ...STRETCH_DATA.sideB];
  const doneCount = allItems.filter((_, i) => state.stretchDone[`s_${i}`]).length;
  const pct = Math.round((doneCount / allItems.length) * 100);

  let html = `<div class="day-hero">
    <div class="day-hero-title">Daily Stretch Flow</div>
    <div class="day-hero-focus">Side splits + Middle splits • 10-15 min</div>
    <div class="day-progress">
      <div class="day-progress-bar"><div class="day-progress-fill" style="width:${pct}%"></div></div>
      <div class="day-progress-text">${doneCount}/${allItems.length} done</div>
    </div>
  </div>`;

  html += `<div class="stretch-section"><div class="stretch-section-title">Part A — Side Splits (5-7 min)</div>`;
  STRETCH_DATA.sideA.forEach((item, i) => {
    const done = !!state.stretchDone[`s_${i}`];
    html += `<div class="stretch-item" onclick="toggleStretch(${i})">
      <div class="stretch-check ${done ? 'done' : ''}">${done ? '✓' : ''}</div>
      <div class="stretch-item-main">
        <div class="stretch-item-name">${item.name}</div>
        <div class="stretch-item-meta">${item.duration} · ${item.sides}</div>
        <div class="stretch-item-cue">${item.cue}</div>
      </div>
    </div>`;
  });
  html += `</div>`;

  html += `<div class="stretch-section"><div class="stretch-section-title">Part B — Middle Splits (5-7 min)</div>`;
  STRETCH_DATA.sideB.forEach((item, i) => {
    const idx = STRETCH_DATA.sideA.length + i;
    const done = !!state.stretchDone[`s_${idx}`];
    html += `<div class="stretch-item" onclick="toggleStretch(${idx})">
      <div class="stretch-check ${done ? 'done' : ''}">${done ? '✓' : ''}</div>
      <div class="stretch-item-main">
        <div class="stretch-item-name">${item.name}</div>
        <div class="stretch-item-meta">${item.duration} · ${item.sides}</div>
        <div class="stretch-item-cue">${item.cue}</div>
      </div>
    </div>`;
  });
  html += `</div>`;

  html += `<div style="background:var(--accent-dim);border-radius:14px;padding:12px 14px;border-left:3px solid var(--accent);">
    <div style="font-size:12px;color:var(--text2);line-height:1.6;">
      <strong style="color:var(--accent)">Tip:</strong> Breathe through each position — don't bounce.<br>
      <strong style="color:var(--accent)">PNF (every 3rd session):</strong> 10s contract → 20s deeper relax. Breaks plateaus.
    </div>
  </div>`;

  document.getElementById('scrollArea').innerHTML = html;
}

function renderHandstand() {
  const drill = (name, meta, note, doneKey, onclickFn) => {
    const done = !!state.hsDone[doneKey];
    return `<div onclick="${onclickFn}" style="background:var(--surface2);border-radius:10px;padding:12px 14px;margin-bottom:6px;display:flex;align-items:flex-start;gap:10px;cursor:pointer;">
      <div style="width:22px;height:22px;border-radius:6px;border:1.5px solid ${done ? 'var(--accent)' : 'var(--border)'};background:${done ? 'var(--accent-dim)' : 'var(--surface3)'};display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;margin-top:1px;color:var(--accent);">${done ? '✓' : ''}</div>
      <div style="flex:1;">
        <div style="font-size:13px;font-weight:600;color:var(--text);">${name}</div>
        <div style="font-size:11px;color:var(--text2);margin-top:2px;">${meta}</div>
        <div style="font-size:11px;color:var(--text3);margin-top:3px;line-height:1.4;">${note}</div>
      </div>
    </div>`;
  };

  let html = `<div class="day-hero">
    <div class="day-hero-title">Handstand Progression</div>
    <div class="day-hero-focus">Beginner • ~25 min • Day 6 primary skill</div>
  </div>`;

  // Wrist prep — always visible
  html += `<div style="background:var(--surface);border-radius:14px;border:1px solid var(--border);padding:14px 16px;">
    <div style="font-size:11px;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:4px;">Always First — Every Session</div>
    <div style="font-size:15px;font-weight:600;color:var(--text);margin-bottom:12px;">⚡ Stage 0 — Wrist Prep (3 min)</div>`;
  HANDSTAND_DATA.wristPrep.forEach((d, i) => {
    html += drill(d.name, `${d.reps} · ${d.sets} set${d.sets > 1 ? 's' : ''}`, d.note,
      `hs_wrist_${i}`,
      `state.hsDone['hs_wrist_${i}']=!state.hsDone['hs_wrist_${i}'];saveState();renderHandstand()`);
  });
  html += `</div>`;

  // Stages — all flat, always visible
  HANDSTAND_DATA.stages.forEach((stage, si) => {
    html += `<div style="background:var(--surface);border-radius:14px;border:1px solid var(--border);padding:14px 16px;">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
        <div style="background:var(--accent);color:#000;border-radius:8px;padding:4px 10px;font-size:12px;font-weight:700;">${stage.badge}</div>
        <div style="font-size:14px;font-weight:600;color:var(--text);">${stage.title}</div>
      </div>`;
    stage.drills.forEach((d, di) => {
      html += drill(d.name, d.target, d.note,
        `hs_s${si}_d${di}`,
        `toggleHsDrill(${si},${di})`);
    });
    html += `</div>`;
  });

  // Principles
  html += `<div style="background:var(--accent-dim);border-radius:14px;padding:14px 16px;border-left:3px solid var(--accent);">
    <div style="font-size:12px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px;">Key Principles</div>
    ${HANDSTAND_DATA.principles.map(p => `<div style="font-size:13px;color:var(--text2);line-height:1.5;margin-bottom:6px;">• ${p}</div>`).join('')}
  </div>`;

  document.getElementById('scrollArea').innerHTML = html;
}

function renderLsit() {
  const drill = (name, meta, note, doneKey, onclickFn) => {
    const done = !!state.lsDone[doneKey];
    return `<div onclick="${onclickFn}" style="background:var(--surface2);border-radius:10px;padding:12px 14px;margin-bottom:6px;display:flex;align-items:flex-start;gap:10px;cursor:pointer;">
      <div style="width:22px;height:22px;border-radius:6px;border:1.5px solid ${done ? 'var(--accent)' : 'var(--border)'};background:${done ? 'var(--accent-dim)' : 'var(--surface3)'};display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;margin-top:1px;color:var(--accent);">${done ? '✓' : ''}</div>
      <div style="flex:1;">
        <div style="font-size:13px;font-weight:600;color:var(--text);">${name}</div>
        <div style="font-size:11px;color:var(--text2);margin-top:2px;">${meta}</div>
        <div style="font-size:11px;color:var(--text3);margin-top:3px;line-height:1.4;">${note}</div>
      </div>
    </div>`;
  };

  let html = `<div class="day-hero">
    <div class="day-hero-title">L-Sit Progression</div>
    <div class="day-hero-focus">Beginner → Advanced · Day 1 + Day 6 · 2×/week</div>
  </div>`;

  // How it works banner
  html += `<div style="background:var(--surface);border-radius:14px;border:1px solid var(--border);padding:14px 16px;">
    <div style="font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px;">How To Progress</div>
    <div style="font-size:13px;color:var(--text2);line-height:1.6;">Work Stage 1 until support holds feel solid (W1-2). Move to Stage 2 tuck holds — aim for 3 × 10s before advancing. One-leg L-sit bridges you to full L. <strong style="color:var(--text);">Log your hold time every set.</strong> That number going up is the whole game.</div>
  </div>`;

  // Stages
  LSIT_DATA.stages.forEach((stage, si) => {
    html += `<div style="background:var(--surface);border-radius:14px;border:1px solid var(--border);padding:14px 16px;">
      <div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:4px;">
        <div style="background:var(--accent);color:#000;border-radius:8px;padding:4px 10px;font-size:12px;font-weight:700;flex-shrink:0;">${stage.badge}</div>
        <div>
          <div style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:2px;">${stage.title}</div>
          <div style="font-size:12px;color:var(--text3);margin-bottom:10px;">Goal: ${stage.goal}</div>
        </div>
      </div>`;
    stage.drills.forEach((d, di) => {
      html += drill(d.name, d.target, d.note,
        `ls_s${si}_d${di}`,
        `toggleLsDrill(${si},${di})`);
    });
    html += `</div>`;
  });

  // Principles
  html += `<div style="background:var(--accent-dim);border-radius:14px;padding:14px 16px;border-left:3px solid var(--accent);">
    <div style="font-size:12px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px;">Key Principles</div>
    ${LSIT_DATA.principles.map(p => `<div style="font-size:13px;color:var(--text2);line-height:1.5;margin-bottom:6px;">• ${p}</div>`).join('')}
  </div>`;

  document.getElementById('scrollArea').innerHTML = html;
}

function toggleLsDrill(si, di) {
  const key = `ls_s${si}_d${di}`;
  state.lsDone[key] = !state.lsDone[key];
  saveState();
  renderLsit();
}

function renderPullup() {
  const drill = (name, meta, note, doneKey, onclickFn) => {
    const done = !!state.puDone[doneKey];
    return `<div onclick="${onclickFn}" style="background:var(--surface2);border-radius:10px;padding:12px 14px;margin-bottom:6px;display:flex;align-items:flex-start;gap:10px;cursor:pointer;">
      <div style="width:22px;height:22px;border-radius:6px;border:1.5px solid ${done ? 'var(--accent)' : 'var(--border)'};background:${done ? 'var(--accent-dim)' : 'var(--surface3)'};display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;margin-top:1px;color:var(--accent);">${done ? '✓' : ''}</div>
      <div style="flex:1;">
        <div style="font-size:13px;font-weight:600;color:var(--text);">${name}</div>
        <div style="font-size:11px;color:var(--text2);margin-top:2px;">${meta}</div>
        <div style="font-size:11px;color:var(--text3);margin-top:3px;line-height:1.4;">${note}</div>
      </div>
    </div>`;
  };

  let html = `<div class="day-hero">
    <div class="day-hero-title">Pull-Up Progression</div>
    <div class="day-hero-focus">Chin-Up → Neutral-Grip → Overhand Pull-Up</div>
  </div>`;

  // Path banner
  html += `<div style="background:var(--surface);border-radius:14px;border:1px solid var(--border);padding:14px 16px;">
    <div style="font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px;">The Path</div>
    <div style="font-size:13px;color:var(--text);font-weight:600;margin-bottom:8px;">${PULLUP_DATA.path}</div>
    <div style="font-size:12px;color:var(--text2);line-height:1.6;">You train chin-ups on <strong style="color:var(--text);">Day 1 (main)</strong> + <strong style="color:var(--text);">Days 2, 4, 6 (5-min warm-up skill)</strong>. That's 4× per week of pull pattern — the right frequency to get your first rep in 4-8 weeks.</div>
  </div>`;

  // Milestones
  html += `<div style="background:var(--surface);border-radius:14px;border:1px solid var(--border);padding:14px 16px;">
    <div style="font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:10px;">Milestone Checklist</div>
    ${PULLUP_DATA.milestones.map((m, i) => {
      const key = `pu_milestone_${i}`;
      const done = !!state.puDone[key];
      return `<div onclick="state.puDone['${key}']=!state.puDone['${key}'];saveState();renderPullup()" style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer;">
        <div style="width:20px;height:20px;border-radius:5px;border:1.5px solid ${done ? 'var(--accent)' : 'var(--border)'};background:${done ? 'var(--accent-dim)' : 'transparent'};display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--accent);flex-shrink:0;">${done ? '✓' : ''}</div>
        <div style="font-size:13px;color:${done ? 'var(--text3)' : 'var(--text)'};text-decoration:${done ? 'line-through' : 'none'};">${m}</div>
      </div>`;
    }).join('')}
  </div>`;

  // Stages
  PULLUP_DATA.stages.forEach((stage, si) => {
    html += `<div style="background:var(--surface);border-radius:14px;border:1px solid var(--border);padding:14px 16px;">
      <div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:4px;">
        <div style="background:var(--accent);color:#000;border-radius:8px;padding:4px 10px;font-size:12px;font-weight:700;flex-shrink:0;">${stage.badge}</div>
        <div>
          <div style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:2px;">${stage.title}</div>
          <div style="font-size:12px;color:var(--text3);margin-bottom:10px;">Goal: ${stage.goal}</div>
        </div>
      </div>`;
    stage.drills.forEach((d, di) => {
      html += drill(d.name, d.target, d.note,
        `pu_s${si}_d${di}`,
        `togglePuDrill(${si},${di})`);
    });
    html += `</div>`;
  });

  // Principles
  html += `<div style="background:var(--accent-dim);border-radius:14px;padding:14px 16px;border-left:3px solid var(--accent);">
    <div style="font-size:12px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px;">Key Principles</div>
    ${PULLUP_DATA.principles.map(p => `<div style="font-size:13px;color:var(--text2);line-height:1.5;margin-bottom:6px;">• ${p}</div>`).join('')}
  </div>`;

  document.getElementById('scrollArea').innerHTML = html;
}

function togglePuDrill(si, di) {
  const key = `pu_s${si}_d${di}`;
  state.puDone[key] = !state.puDone[key];
  saveState();
  renderPullup();
}

function renderMain() {
  if (state.tab === 'workout') renderWorkout();
  else if (state.tab === 'stretch') renderStretch();
  else if (state.tab === 'handstand') renderHandstand();
  else if (state.tab === 'lsit') renderLsit();
  else if (state.tab === 'pullup') renderPullup();
}

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
window.onerror = function(msg, src, line, col, err) {
  const el = document.getElementById('scrollArea');
  if (el) el.innerHTML = `<div style="color:#f87171;padding:20px;font-size:13px;line-height:1.8;background:#1a1a1a;border-radius:12px;margin:12px;"><strong>JS Error:</strong><br>${msg}<br>Line ${line}:${col}<br>${err ? err.stack : ''}</div>`;
};
try {
  loadState();
  renderTabs();
  renderMain();
} catch(e) {
  const el = document.getElementById('scrollArea');
  if (el) el.innerHTML = `<div style="color:#f87171;padding:20px;font-size:13px;line-height:1.8;background:#1a1a1a;border-radius:12px;margin:12px;"><strong>Init Error:</strong><br>${e.message}<br><br>${e.stack}</div>`;
}
</script>
</body>
</html>
